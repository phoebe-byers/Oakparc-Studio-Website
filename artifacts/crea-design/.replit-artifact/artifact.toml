kind = "web"
previewPath = "/"
title = "Crea Design Co"
version = "1.0.0"
id = "artifacts/crea-design"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21876

[services.development]
run = "pnpm --filter @workspace/crea-design run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/crea-design", "run", "build" ]
publicDir = "artifacts/crea-design/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21876"
BASE_PATH = "/"
